<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="X-UA-Compatible" content="IE=9">
  <title>${title}</title>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <script type="application/javascript" src="/bugsnag.js"></script>
  <style type="text/css">
    #errors {color: red;}
    /* ça devrait être dans mtgLoader.css */
    svg {
      -webkit-user-select: none; /* Chrome all / Safari all */
      -moz-user-select: none; /* Firefox all */
      -ms-user-select: none; /* IE 10+ */
      -webkit-tap-highlight-color: transparent; /*Nécessaire sur ipad pour ne pas avoir de rectanle gris sélectionné lors des touch events */
    }
  </style>
  <script type="text/x-mathjax-config">
    MathJax.Hub.Config({
      tex2jax: {
        inlineMath: [["$","$"],["\\(","\\)"]]
      },
      SVG:{mtextFontInherit: false},
      jax: ["input/TeX","output/SVG"],
      TeX: {extensions: ["color.js"]},
      messageStyle:'none'
    });
  </script>
  <script type="text/javascript" src="https://www.mathgraph32.org/ftp/js/MathJax/MathJax.js?config=TeX-AMS-MML_SVG-full"></script>
  <link rel="stylesheet" href="https://www.mathgraph32.org/ftp/js/mtgloader/mtgLoader.css"/>
  <script type="text/javascript" src="https://www.mathgraph32.org/ftp/js/mtgloader/mtgLoader.min.js"></script>
</head>
<body>
<div id="spinner">Chargement en cours… <img src="/plugins/mathgraph/spinner.gif" alt="" /></div>
<div id="errors"></div>
<div id="main"></div>
<script type="application/javascript">
  // ATTENTION, le code ci-dessous doit être de l'es5 car il ne passe pas par babel
  // @todo mettre ça dans un js séparé qui passerait par webpack
  // (chargé ici avec du <script src="/plugins/mathgraph/editor.js" …)
  function load (ressource, fields) {
    /* glob mtgLoader */
    if (typeof mtgLoader !== 'function') return alert('mathgraph n’est pas chargé correctement')

    var mtgApp
    var parametres = ressource.parametres

    // hauteur et largeur (copié de display.js, à maintenir sync)
    var width = parametres.width || document.body.clientWidth || 1024
    if (!Number.isInteger(width) || width < 300) width = 300
    var height = parametres.height || document.body.clientHeight
    if (!Number.isInteger(height) || height < 200) height = Math.round(width * 0.66)
    // qu'on met dans svgOptions
    var svgOptions = {
      width,
      height
    }

    var mtgOptions = parametres
    // à la création on démarre avec une interface collège
    // (le prof pourra changer ensuite dans l'éditeur
    // et getParametres nous renverra la valeur modifiée)
    // le level sert pour ouvrir mathgraph avec une figure vierge, ou pour limiter les outils disponibles
    // il peut être mdifié dans l'interface mtg si mtgOptions.options === true
    // 0 : école
    // 1 : collège
    // 2 : lycée sans les nombres complexes
    // 3 : lycée avec les nombres complexes
    // Si la figure est fournie, en édition il faut fournir le level le plus élevé
    // pour que le prof puisse activer tous les outils qu'il voudrait ajouter
    if (!parametres.hasOwnProperty('level')) mtgOptions.level = 1
    // à la création on démarre avec ça par défaut (sans repère, juste vecteur unité)
    if (!mtgOptions.fig) mtgOptions.fig = {type: 'unity', grad: 'simple', unity: 'deg'}
    // ce paramètre dys à true sert à afficher la figure avec des traits plus gros,
    // des lettres plus espacées, etc.
    // Il n'est pas contenu dans la figure
    if (!mtgOptions.hasOwnProperty('dys')) mtgOptions.dys = false
    // pour les exercices de construction c'est indispensable
    mtgOptions.edition = true
    // bouton pour ouvrir une figure, l'info est dans la figure mais on le force ici (édition)
    mtgOptions.open = true
    // options: pour autoriser à changer les options de la figure, true par défaut, toujours true en édition
    mtgOptions.options = true
    // on veut que l'outil permettant d'enregistrer une figure soit présent,
    // pour qu'il puisse enregistrer en local
    // si ça perturbe on mettra false...
    mtgOptions.save = true
    // onSaveCallback n'a de sens que si `figureOptions.save === true`,
    // ici on laisse le comportement par défaut sur le bouton enregistrement de mathgraph
    // (en fichier local et pas dans la sesatheque) car on récupère la figure au clic sur
    // enregistrer (dans la page html hors mathgraph)

    // quand mtg sera chargé on mettra nos listeners
    mtgOptions.callBackAfterReady = function () {
      // on vire le spinner
      var spinner = document.getElementById('spinner')
      while (spinner.firstChild) spinner.removeChild(spinner.firstChild)
      // et on ajoute nos listeners
      window.addEventListener('blur', function () {
        var result = mtgApp.getResult()
        if (!result) throw new Error('mathgraph ne remonte aucune info')
        if (!result.fig || typeof result.fig !== 'string') throw new Error('mathgraph ne renvoie pas la figure')
        var level = result.level
        if (!level || typeof level !== 'number' || !Number.isInteger(level) || level < 0) {
          console.error(new Error('level n’est pas un entier positif ou nul (on le fixe à 3)'))
          result.level = 3
        }
        // faut ajouter hauteur et largeur s'ils y étaient
        if (parametres.height) result.height = parametres.height
        if (parametres.width) result.width = parametres.width

        fields.parametres.input.onBlur(result)
      })
      window.addEventListener('click', function () {
        window.focus()
      })
      window.addEventListener('focus', function () {
        fields.parametres.input.onFocus()
      })
    } // callBackAfterReady

    mtgApp = mtgLoader('main', mtgOptions.fig, svgOptions, mtgOptions)
  } // load
</script>
</body>
</html>
