<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>test Mathgraph</title>
</head>
<body>
<script src="https://www.java.com/js/deployJava.js"></script>
<script>
// cf https://docs.oracle.com/javase/tutorial/deployment/deploymentInDepth/runAppletFunction.html
//    attributes – The names and values of the attributes of the generated <applet> tag
//    parameters – The names and values of the <param> tags in the generated <applet> tag
//    minimumVersion – The minimum version of the JRE software that is required to run this applet
  var attributes = {
    id:"mtgApplet",
    code:'mathgraph32.MtgFrame.class',
    archive:'MathGraph32Applet.jar',
    codebase: "http://www.mathgraph32.org/webstart/4.9.9/",
    width:600, 
    height:450
  };
  var parameters = {
    // permissions:'sandbox', // déclenche une alerte de sécurité, puis un plantage java quand on accepte
    initialFigure : "orthonormalFrame",
    allowLeftToolbar:true,
    allowTopToolbar:true,
    allowRightToolbar:true,
    allowToolsChoice:true,
    allowMenuBar:true,
    allowFileMenu:true,
    allowOptionsMenu:true,
    language:true,
    level:3,
  };
  var version = "1.5";
  deployJava.runApplet(attributes, parameters, version);
</script>
<div>
  <button id="mtgButton">Récupérer la figure</button>
</div>
<script type="application/javascript">
  var mtgButton = document.getElementById("mtgButton");
  window.addEventListener('click', function () {
    console.log("l'objet mtgApplet");
    console.dir(mtgApplet);
    console.log("Et on appelle sa méthode getScript");
    try {
      console.log(mtgApplet.getScript());
    } catch (error) {
      console.error(error);
    }
  })
</script>
</body>
</html>
