<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Éditeur d'arbre</title>
  <script type="application/javascript" src="/bugsnag.js"></script>
</head>
<body>
  <div id="formRessource">
      <div id="root">
        <div id="display"></div>
      </div>
  </div>
  <script src="/editArbre.js"></script>
  <script type="application/javascript">
    function load (ressource, options, fields) {
      const saveCallback = (error, getParametres) => {
        if (error) return console.error(error)
        window.addEventListener('focus', () => {
          fields.input.onFocus()
        })
        window.addEventListener('blur', () => {
          fields.input.onBlur(getParametres())
        })
        window.addEventListener('click', () => {
          window.focus()
        })
      }
      steditArbre.default(ressource, options, saveCallback)
    }
  </script>
  </body>
</html>
