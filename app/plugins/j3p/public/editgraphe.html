<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Éditeur de graphe j3p</title>
  <script type="application/javascript" src="/bugsnag.js"></script>
  <script type="application/javascript" src="/registerSesatheques.js"></script>
  <link rel="stylesheet" type="text/css" href="/editGraphe.css">
</head>
<body>
<div id="root"></div>
<script src="/editGraphe.js"></script>
<script type="application/javascript">
  // une fct en global que notre parent appellera
  function load (ressource, input) {
    // quand le js sera chargé
    const saveCallback = (error, getParametres) => {
      if (error) return console.error(error)
      window.addEventListener('click', () => {
        window.focus()
      })
      window.addEventListener('focus', () => {
        input.onFocus()
      })
      window.addEventListener('blur', () => {
        input.onBlur(getParametres())
      })
    }
    var root = document.getElementById('root')
    if (typeof j3p_editGraphe !== 'undefined') j3p_editGraphe.default(root, ressource, saveCallback)
    else root.innerText = 'Problème de chargement d’editgraphe ' + typeof j3p_editGraphe
  }
</script>
</body>
</html>
