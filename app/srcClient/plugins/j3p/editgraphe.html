<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Éditeur de graphe j3p</title>
  <link rel="stylesheet" type="text/css" href="/editGraphe.css">
</head>
<body>
<div id="root"></div>
<script type="application/javascript">
  // une fct en global que notre parent appellera
  function load (ressource, loadCb) {
    // quand le js sera chargé
    function onLoad () {
      script.removeEventListener('load', onLoad)
      var root = document.getElementById('root')
      if (typeof steditGraphe === 'function') steditGraphe(root, ressource, loadCb)
      else root.innerText = 'Problème de chargement d’editgraphe'
    }
    // console.log('load de l’iframe appelé avec', cssPath, jsPath, ressource)
    var head = window.document.getElementsByTagName('head')[0]
    var script = window.document.createElement('script')
    script.type = 'application/javascript'
    document.body.appendChild(script)
    script.addEventListener('load', onLoad)
    script.src = '/editGraphe.bundle.js'
  }
</script>
</body>
</html>
