<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html>
<head>
  <meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=7">
  <title>mtg32</title>
</head>
<body>

    <applet style="border:1px solid;" id="mtgApplet" code="mathgraph32.MtgFrame.class"
            archive="MathGraph32Applet.jar" name="MathGraph32JavaApplet"
            height="600" width="800">
        <param name="language" value="fra">
        <param name="onInitParam" value="1_0">
        <param name="allowExercise" value="true">
        <param name="allowLevelChoice" value="false">
        <param name="level" value="3">
        <param name="allowMenuBar" value="true">
        <param name="allowFileOpen" value="false">
        <param name="allowFileMenu" value="false">
        <param name="allowOptionsMenu" value="false">
        <param name="allowToolsChoice" value="false">
        <param name="allowLeftToolbar" value="true">
        <param name="allowTopToolbar" value="true">
        <param name="allowRightToolbar" value="true">
        <param name="allowIndicationArea" value="true">
        <param name="figureData"
               value="TWF0aEdyYXBoSmF2YTEuMAAAAA0+TMzNAANmcmH###8BAP8BAAAAAAAAAAAAAAAAAAAAAh0AAAIFAAAAAAAAAAAAAAAAAAAABP####8AAAABABFvYmpldHMuQ0NhbGNDb25zdAD#####AAJwaQAWMy4xNDE1OTI2NTM1ODk3OTMyMzg0Nv####8AAAABABFvYmpldHMuQ0NvbnN0YW50ZUAJIftURC0Y#####wAAAAEAEW9iamV0cy5DUG9pbnRCYXNlAP####8AAAAAAAIAAAEFAAFAZKAAAAAAAEBVgAAAAAAAAAAAAgD#####AAAAAAACAAABBQABQHHgAAAAAABAZgAAAAAAAP####8AAAABABBvYmpldHMuQ0Ryb2l0ZUFCAP####8AAAAAAAIAAAEAAAAAAQAAAAL###############8=">
    </applet>
    <div>
        <button id="mtgButton">Récupérer la figure</button>
    </div>
    <div id="resultat"></div>
    <script type="application/javascript">
        function recup() {
          try {
            i++;
            resultat = document.getElementById('mtgApplet').getScript();
            console.log("on récupère la figure après " + i + " essais : " + resultat);
            document.getElementById('resultat').innerHTML = resultat;
          } catch (error) {
            if (i < 50) {
              setTimeout(recup, 100);
            } else {
              console.log("plante toujours après " + i + " essais");
              console.error(error);
              document.getElementById('resultat').innerHTML = "Ça veut toujours pas après " +i +" essais :" +error;
            }
          }
        }
        var i = 0;
        var resultat;
        var mtgButton = document.getElementById("mtgButton");
        mtgButton.addEventListener('click', function () {
          recup();
        })
    </script>
</body>
</html>
