<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test chargement js</title>
  <script type="text/javascript" src="/vendors/requirejs/require.min.js"></script>
</head>
<body>

<div id="foo"></div>
<div id="bar"></div>

<script type="text/javascript">
  // si l'on veut récupérer les résultats, faut une fonction pour ça
  function saveResultat(resultat) {
    // on a reçu un résultat que l'on va enregistrer ici
    console.log(resultat);
  }

  // pour récupérer les param avant de charger init, au cas où on demanderai un domaine
  function getURLParameter(name) {
    var regexp = new RegExp('[?|&]' + name + '=([^&#]+?)(&|#|$)');
    var param = regexp.exec(window.location.search);

    return param ? decodeURIComponent(param[1].replace(/\+/g, '%20')) : undefined;
  };

  // on veut afficher la ressource indiquée ou une par défaut
  var id = getURLParameter("id") || "em/42";
  var base = getURLParameter("domain");
  if (base) {
    if (base.substr(0, 4) !== "http") base = "http://" + base; // pour du https faudra le passer dans domain
    if (base.substr(-1) !== "/") base += "/";
  } else {
    base = "/";
  }
  // exemple pour configurer le require de la sesatheque et y charger ensuite des modules
  require([base +"init.js"], function(init) {
    // on lui précise container et errorsContainer sinon il les créé
    // pour faire seulement l'init de requireJs avec le chemin sans charger les méthodes globales ni ajouter
    // ces containers, appeler seulement initRequire (seul bémol, jQueryUi a besoin de requireGlobal pour charger ses css,
    // faut appeler avant requireGlobal dans ce cas)
    var options = {
      base : base,
      errorsContainer : document.getElementById("foo"),
      container : document.getElementById("bar")
    };
    init(options, function (error) {
      if (error) {
        console.error(error);
      } else {
        // on peut appeler d'autres modules par leur nom
        require(['apiClient', 'display'], function (apiClient, display) {
          // chargement des datas de la ressource
          apiClient.getRessource(id, function (error, ressource) {
            if (error) console.error(error);
            else if (ressource) {
              // les options à passer, plus la peine de préciser la base mais faut les containers
              var options = {
                container : document.getElementById("laRessource"),
                errorsContainer : document.getElementById("errors"),
                resultatCallback : saveResultat
              };
              // et on affiche
              display(ressource, options);
            }
          });
        })
      }
    });
  })
</script>
</body>
</html>
