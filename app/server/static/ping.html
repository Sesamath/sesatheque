<!DOCTYPE html>
<html>
<head lang="fr">
  <meta charset="UTF-8">
  <title>Test postMessage en cross-domain</title>
</head>
<body>
<script type="application/javascript">
  if (window.addEventListener && window.postMessage){
    addEventListener('message', function (event) {
      if (event.data === 'ping') window.parent.postMessage('pong', '*')
    }, false)
  }
</script>
</body>
</html>
