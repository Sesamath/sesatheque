version: '2'
services:
  mysql-global:
    image: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sesatheque
      MYSQL_USER: sesatheque
      MYSQL_PASSWORD: sesatheque

  mysql-private:
    image: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: stcommun
      MYSQL_USER: stcommun
      MYSQL_PASSWORD: stcommun

  app-global:
    build: ./docker/node
    ports:
      - 3001:3001
    volumes:
      - .:/app
    links:
      - mysql-global
      - memcache
    command: npm run start:dev

  app-private:
    build: ./docker/node
    ports:
      - 3003:3003
    volumes:
      - .:/app
    links:
      - mysql-private
      - memcache
    command: npm run start:devcommun

  memcache:
    image: memcached