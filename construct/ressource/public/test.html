<script type="text/javascript">

      var iframe = document.getElementById("iframe");

      $("#exoEm").click(function () {
        iframe.src = "/public/voir/em/42?urlResultatCallback=http://bibliotheque.local:3001/foo"
      })
      $("#exoAm").click(function () {

      })
    }, function (error) {
      console.log("erreur de chargement")
      console.dir(error)
    })

</script>
