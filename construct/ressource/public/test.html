<!DOCTYPE html public "-//W3C//DTD HTML 4.01 Transitional//EN">
<!-- faut un doctype html4 pour permettre la hauteur en % -->
<html>
<head lang="fr">
  <meta charset="UTF-8">
  <title>Page statique de test</title>
  <link rel="stylesheet" href="/vendors/jstree/dist/themes/default/style.min.css" />
  <link rel="stylesheet" href="/styles/ressources.css" />
  <script type="application/javascript" src="/vendors/jquery/jquery.1.11.3.min.js"></script>
  <script type="application/javascript" src="/vendors/jstree/dist/jstree.min.js"></script>
  <style type="text/css">
    #arbres {display:table-row}
    #src {display: table-cell; width: 50%}
    #dst {display: table-cell; width: 50%}
  </style>
</head>
<body>
  <div id="content">
    Vous pouvez faire glisser des éléments de l'arbre de gauche vers celui de droite (lui enlever des éléments ne le modifie que sur cette page)
    <div>Mettre en valeur les éléments qui contiennent <br /><input id="jstSearch" type="text" maxlength="20" /></div>
    <div id="arbres">
      <div id="src">
        <div id="jstreeSrc">Chargement en cours...</div>
      </div>
      <div id="dst">
        <div id="jstreeDst"></div>
        <button id="saveDst">Sauvegarder</button>
      </div>
    </div>
  </div>
  <script type="application/javascript">
try {
  if (typeof $ === 'undefined') throw new Error("Pb de chargement de jquery")
  if (!$.jstree) throw new Error("Pb de chargement de jstree")

  $('#jstreeSrc').jstree({
      core : {
          animation : 0,
          check_callback : function (operation, node, node_parent, node_position, more) {
            // operation can be 'create_node', 'rename_node', 'delete_node', 'move_node' or 'copy_node'
            // in case of 'rename_node' node_position is filled with the new node name
            console.log('src operation ' +operation)
            console.log(node)
            return true;
          },
          data : {
              url : function (node) {
                  // jstree est pas capable d'utiliser tout seul une url qu'on lui file...
                  return node.data && node.data.url || '/api/jstree?id=sesaxml/exercices_interactifs'
              }
          }
      },
      plugins : ["dnd", "search"]
  })

  $('#jstreeDst').jstree({
    core : {
      animation : 0,
      check_callback : function (operation, node, node_parent, node_position, more) {
        console.log('dst operation ' +operation)
        console.log(node)
        return true;
      },
      data : {
        text : 'nouvel arbre',
        icon : 'arbreItem'
      }
    },
    plugins : ["dnd"]
  })

  // pour la recherche, on écoute la modif de l'input
  var timer;
  $("#jstSearch").keyup(function () {
    // on est appelé à chaque fois qu'une touche est relachée dans cette zone de saisie
    // on lancera la recherche dans 1/4s si y'a pas eu d'autre touche
    if (timer) { clearTimeout(timer); }
    timer = setTimeout(function () {
      var v = $('#jstSearch').val();
      $('#jstreeSrc').jstree(true).search(v);
    }, 250);
  });

  // pour la sauvegarde
  $('#saveDst').click(function () {
    var tree = $('#jstreeDst').jstree('get_json')
    console.log('faut sauvegarder ce truc')
    console.log(tree)
  })
} catch (error) {
  if (console && console.error) console.error(error);
  document.getElementById('jstree').innerHTML = error.toString();
}
    </script>
</body>
</html>
